*{box-sizing:border-box;margin:0;padding:0}
:root{
  --hbg:#1e1b4b;--htxt:#fff;--acc:#6366f1;--acctxt:#fff;

body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px}
input,select,textarea{background:#fff;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;width:100%;outline:none;color:var(--txt);transition:border 0.15s,box-shadow 0.15s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
button{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 13px;font-size:13px;cursor:pointer;color:var(--txt);transition:all 0.15s;font-family:inherit;white-space:nowrap}
button:hover{background:var(--alt)}
.btn-primary{background:var(--acc);color:var(--acctxt);border-color:var(--acc);font-weight:600}
.btn-primary:hover{opacity:.9;background:var(--acc)}
.btn-danger{color:#dc2626;border-color:#fca5a5}
.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:transparent;border-color:transparent;color:var(--sec)}
.btn-ghost:hover{background:var(--alt);color:var(--txt)}
table{border-collapse:collapse;width:100%}
th,td{border-bottom:1px solid var(--border);text-align:left;vertical-align:middle}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:flex-start;justify-content:center;z-index:400;overflow-y:auto;padding:2rem 1rem}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:100%;border:1px solid var(--border);margin-top:24px;box-shadow:0 12px 48px rgba(0,0,0,.16);max-width:720px}
.modal-sm{max-width:400px}
.modal-md{max-width:520px}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;gap:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.igrp{display:flex;flex-direction:column;gap:4px}
.igrp label{font-size:11px;font-weight:700;color:var(--sec);text-transform:uppercase;letter-spacing:.05em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.pwr{position:relative}
.pwr input{padding-right:36px}
.pwr .eb{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:2px;color:var(--sec)}
.toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 24px rgba(0,0,0,.22);animation:toastin .22s ease;pointer-events:none}
@keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav-btn{border:1px solid transparent;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:transparent;font-family:inherit}
.drag-handle{cursor:grab;color:var(--sec);padding:0 4px;opacity:.5}
.drag-handle:hover{opacity:1}
.col-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;margin-bottom:6px;transition:background .1s}
.col-item.dragging{opacity:.4}
.col-item.drag-over{border-color:var(--acc);background:#f5f3ff}
.section-hd{font-size:18px;font-weight:700;color:var(--acc);margin:0 0 1.25rem}
.view-only-bar{background:#fef3c7;border:1px solid #fcd34d;border-radius:9px;padding:9px 14px;font-size:13px;color:#92400e;display:flex;align-items:center;gap:7px;margin-bottom:1rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.crow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6}
.cust-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;transition:box-shadow .15s}
.cust-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.08)}
.th-drag{cursor:grab}
.th-drag:active{cursor:grabbing}
.empty{padding:2.5rem;text-align:center;color:var(--sec)}
input[type=color]{width:30px;height:26px;border:1px solid var(--border);border-radius:5px;padding:2px;cursor:pointer;background:none}
.tab{padding:6px 14px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-size:13px;background:transparent;font-weight:500;color:var(--sec)}
.tab.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.dropdown-wrap{position:relative;display:inline-block}
.dropdown-menu{position:absolute;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.14);z-index:200;min-width:180px;padding:6px;display:flex;flex-direction:column;gap:2px}

/* ─── EXPORT / PRINT / EMAIL UTILS ─────────────────────────── */
function toCSV(rows,cols){
  const hdr=cols.map(c=>'"'+c.label+'"').join(',');
  const body=rows.map(r=>cols.map(c=>{
    const v=r[c.id];
    if(v===null||v===undefined||v==='')return '""';
    return '"'+String(v).replace(/"/g,'""')+'"';
  }).join(',')).join('\n');
  return hdr+'\n'+body;
}

function downloadCSV(rows,cols,filename){
  const blob=new Blob([toCSV(rows,cols)],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

function downloadXLSX(rows,cols,filename,companyName,tag){
  const XLSX=window.XLSX;
  // Build worksheet data
  const wsData=[];
  // Header rows
  wsData.push([companyName||'RFQ Tracking System','','','','','','','','','']);
  wsData.push([tag||'','','','','','','','','','']);
  wsData.push([]);
  wsData.push(cols.map(c=>c.label));
  rows.forEach(r=>wsData.push(cols.map(c=>{
    const v=r[c.id];
    if(c.type==='date'&&v){const d=new Date(v);return isNaN(d)?v:d;}
    return v===null||v===undefined?'':v;
  })));
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  // Column widths
  ws['!cols']=cols.map(c=>({wch:Math.max(12,(c.label||'').length+4)}));
  // Merge title row
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:Math.min(9,cols.length-1)}}];
  // Style header row (row index 3)
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'RFQ Records');
  XLSX.writeFile(wb,filename);
}

function ExportMenu({filtered,visibleCols,theme}){

    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const today=new Date().toISOString().split('T')[0];
  const fname='RFQ_Export_'+today;

  return h('div',{className:'dropdown-wrap',ref},
    h('button',{onClick:()=>setOpen(o=>!o),style:{display:'flex',alignItems:'center',gap:5,border:'1px solid #d1fae5',color:'#065f46',background:'#f0fdf4'}},

      h('button',{className:'dropdown-item',onClick:()=>{downloadXLSX(filtered,visibleCols,fname+'.xlsx',theme.cname,theme.tag);setOpen(false);}},
        h('i',{className:'ti ti-file-spreadsheet',style:{color:'#166534'}}),h('span',null,'Export as Excel (.xlsx)')),
      h('button',{className:'dropdown-item',onClick:()=>{downloadCSV(filtered,visibleCols,fname+'.csv');setOpen(false);}},
        h('i',{className:'ti ti-file-text',style:{color:'#1d4ed8'}}),h('span',null,'Export as CSV')),
      h('div',{style:{borderTop:'1px solid #f3f4f6',margin:'4px 0'}}),
      h('button',{className:'dropdown-item',onClick:()=>{
        // Copy table as tab-separated for paste into Excel

        setOpen(false);

        h('i',{className:'ti ti-clipboard-copy',style:{color:'#7c3aed'}}),h('span',null,'Copy table to clipboard'))
    )
  );
}

    'ko date':'koDate','k.o date':'koDate',
    'ko qty':'koQty','k.o qty':'koQty',
    'cus.eta':'customerETA','customer eta':'customerETA','customer expected date':'customerETA',
    'po no':'poNo','po no.':'poNo','p.o no':'poNo',
    'po date':'poDate',
    'po qty':'poQty',
    'inv.no':'invNo','invoice no':'invNo','inv no':'invNo',
    'inv.date':'invDate','invoice date':'invDate',
    'inv.qty':'invQty','invoice qty':'invQty',
    'mass production date':'productionStartDate','production start date':'productionStartDate','production start':'productionStartDate',
    'dispatch date':'dispatchDate','diapatch date':'dispatchDate','despatch date':'dispatchDate',
    'dispatch qty':'dispatchQty','dispatch quantity':'dispatchQty',
    'remarks':'remarks','remark':'remarks',
  };

  function norm(s){return String(s||'').toLowerCase().replace(/\n/g,' ').trim();}

  function fmtDate(v){
    if(!v||v==='-'||v==='NaN')return '';
    if(v instanceof Date){if(isNaN(v))return '';return v.toISOString().split('T')[0];}
    const s=String(v).trim();
    // try parse various formats
    const patterns=[
      /^(\d{4})-(\d{2})-(\d{2})/,   // 2025-06-16
      /^(\d{2})\.(\d{2})\.(\d{4})/,  // 20.06.2025
      /^(\d{2})-(\d{2})-(\d{4})/,   // 16-06-2025
      /^(\d{2})\/(\d{2})\/(\d{4})/,  // 16/06/2025
    ];
    for(const p of patterns){const m=s.match(p);if(m){
      if(p.source.startsWith('^(\\d{4})')){return m[0].slice(0,10);}
      return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
    }}
    // Excel serial number
    const n=parseFloat(s);
    if(!isNaN(n)&&n>40000&&n<60000){
      const d=new Date(Date.UTC(1899,11,30)+n*86400000);
      return d.toISOString().split('T')[0];
    }
    return '';
  }

  function parseSheet(wb,sheetName){
    // use SheetJS
    const XLSX=window.XLSX;
    const ws=wb.Sheets[sheetName];
    const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:false,dateNF:'yyyy-mm-dd'});
    // find header row (row containing "Customer Name" or "Sl No")
    let headerRow=-1;
    for(let i=0;i<Math.min(raw.length,8);i++){
      const r=raw[i];
      if(!r)continue;
      const joined=r.map(c=>norm(c)).join(' ');
      if(joined.includes('customer')&&(joined.includes('enquiry')||joined.includes('inquiry'))){headerRow=i;break;}
    }
    if(headerRow===-1){setErrMsg('Could not find header row with Customer Name / Enquiry columns.');setStatus('error');return;}
    const headers=raw[headerRow].map(h=>COL_MAP[norm(h)]||null);
    const parsed=[];
    for(let i=headerRow+1;i<raw.length;i++){
      const r=raw[i];
      if(!r||r.every(v=>v===null||v===undefined||String(v).trim()===''||v==='-'))continue;
      const obj={};
      headers.forEach((field,ci)=>{if(field){let v=r[ci];if(v===null||v===undefined||v==='-')v='';obj[field]=v;}});
      if(!obj.customer&&!obj.enquiryNo)continue; // skip blank rows
      // format dates
      ['enquiryDate','quotationDate','koDate','poDate','customerETA','productionStartDate','dispatchDate','invDate','costReceivedDate'].forEach(f=>{
        if(obj[f]!==undefined)obj[f]=fmtDate(obj[f]);
      });
      // clean numbers
      ['enquiryQty','koQty','poQty','dispatchQty','invQty'].forEach(f=>{
        if(obj[f]!==undefined){const n=parseFloat(String(obj[f]).replace(/,/g,''));obj[f]=isNaN(n)?'':n;}
      });
      // clean string vals
      ['customer','enquiryNo','quotationNo','poNo','invNo','status','remarks'].forEach(f=>{
        if(obj[f]!==undefined)obj[f]=String(obj[f]||'').trim();
      });
      obj._sheet=sheetName;
      parsed.push(obj);
    }
    setRows(parsed);
    setStatus('preview');
  }

  function handleFile(file){
    if(!file)return;
    setStatus('parsing');setErrMsg('');setRows([]);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const XLSX=window.XLSX;
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        setWbRef(wb);
        // prefer REV-01 or Total List or April sheet
        const preferred=['REV-01 APR-26-27','Total List','April 26-27','JULY','JAN-26 _1','Sheet1','JUNE','MAY'];
        const available=wb.SheetNames;
        setSheetNames(available);
        const best=preferred.find(s=>available.includes(s))||available[0];
        setSelSheet(best);
        parseSheet(wb,best);
      }catch(err){setErrMsg('Error reading file: '+err.message);setStatus('error');}
    };
    reader.readAsArrayBuffer(file);
  }

  function switchSheet(name){setSelSheet(name);if(wbRef)parseSheet(wbRef,name);}

  function doImport(){
    const newCusts=[...custs];
    let added=0,skipped=0,replaced=0;
    const importedRows=rows.map((r,i)=>({
      ...r,id:Date.now()+i,slNo:i+1,
    }));
    // collect new customers
    importedRows.forEach(r=>{if(r.customer&&!newCusts.includes(r.customer))newCusts.push(r.customer);});
    setCusts(newCusts);
    onImport(importedRows,dupMode);
    setStatus('done');
  }

  return h('div',{className:'modal-bg',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal',style:{maxWidth:760}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}},
        h('div',null,
          h('h3',{style:{margin:'0 0 2px',fontSize:16,fontWeight:700}},'Import from Excel'),
          h('p',{style:{margin:0,fontSize:12,color:'var(--sec)'}},'Upload your RFQ tracking Excel file — all sheets supported')
        ),
        h('button',{onClick:onClose,className:'btn-ghost',style:{padding:'4px 8px'}},'✕')
      ),

      status==='done'&&h('div',{style:{textAlign:'center',padding:'2rem'}},
        h('div',{style:{width:56,height:56,borderRadius:'50%',background:'#dcfce7',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}},h('i',{className:'ti ti-check',style:{fontSize:28,color:'#166534'}})),
        h('h3',{style:{fontSize:16,fontWeight:700,color:'#166534',margin:'0 0 4px'}},'Import Complete!'),
        h('p',{style:{color:'var(--sec)',fontSize:13}},rows.length+' records imported from "'+selSheet+'"'),
        h('button',{onClick:onClose,className:'btn-primary',style:{marginTop:12}},'Close')
      ),

      status==='idle'&&h('div',null,
        h('div',{onClick:()=>fileRef.current.click(),style:{border:'2px dashed #c7d2fe',borderRadius:12,padding:'3rem',textAlign:'center',cursor:'pointer',background:'#f5f3ff',transition:'all .15s'},
          onDragOver:e=>{e.preventDefault();e.currentTarget.style.borderColor='#6366f1';},
          onDragLeave:e=>{e.currentTarget.style.borderColor='#c7d2fe';},
          onDrop:e=>{e.preventDefault();e.currentTarget.style.borderColor='#c7d2fe';const f=e.dataTransfer.files[0];if(f)handleFile(f);}
        },
          h('i',{className:'ti ti-file-spreadsheet',style:{fontSize:48,color:'#6366f1',display:'block',marginBottom:12}}),
          h('p',{style:{fontSize:15,fontWeight:600,color:'#3730a3',margin:'0 0 4px'}},'Click to browse or drag & drop'),
          h('p',{style:{fontSize:12,color:'var(--sec)',margin:0}},'Supports .xlsx and .xls files · All sheets auto-detected')
        ),
        h('input',{type:'file',ref:fileRef,accept:'.xlsx,.xls',style:{display:'none'},onChange:e=>handleFile(e.target.files[0])})
      ),

      status==='parsing'&&h('div',{style:{textAlign:'center',padding:'2rem'}},
        h('i',{className:'ti ti-loader-2',style:{fontSize:40,color:'var(--acc)',animation:'spin 1s linear infinite',display:'block',marginBottom:12}}),
        h('p',{style:{color:'var(--sec)'}}, 'Reading Excel file…'),
        h('style',null,'@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}')
      ),

      status==='error'&&h('div',{style:{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'1rem',textAlign:'center'}},
        h('i',{className:'ti ti-alert-circle',style:{fontSize:28,color:'#dc2626',marginBottom:8,display:'block'}}),

      ),

/* ─── COLUMN MANAGER ────────────────────────────────────────── */
function ColManager({cols,setCols,onClose,isAdmin}){
  const[items,setItems]=useState(cols.map(c=>({...c})));
  const[dragIdx,setDragIdx]=useState(null);
  const[overIdx,setOverIdx]=useState(null);
  const[editId,setEditId]=useState(null);
  const[editLabel,setEditLabel]=useState('');
  const[newCol,setNewCol]=useState('');

  const save=()=>{setCols(items);onClose();};

  const toggle=id=>setItems(it=>it.map(c=>c.id===id&&!c.locked?{...c,visible:!c.visible}:c));

  const startEdit=(id,label)=>{setEditId(id);setEditLabel(label);};
  const saveLabel=()=>{
    if(editLabel.trim())setItems(it=>it.map(c=>c.id===editId?{...c,label:editLabel.trim()}:c));
    setEditId(null);
  };

  const addCol=()=>{
    if(!newCol.trim())return;
    const id='custom_'+Date.now();
    setItems(it=>[...it,{id,label:newCol.trim(),visible:true,width:120,custom:true}]);
    setNewCol('');
  };

  const delCol=id=>setItems(it=>it.filter(c=>c.id!==id));

  const onDragStart=i=>{setDragIdx(i);};
  const onDragOver=(e,i)=>{e.preventDefault();setOverIdx(i);};
  const onDrop=i=>{
    if(dragIdx===null||dragIdx===i)return;
    const arr=[...items];
    const[moved]=arr.splice(dragIdx,1);
    arr.splice(i,0,moved);
    setItems(arr);setDragIdx(null);setOverIdx(null);
  };

  return h('div',{className:'modal-bg',onClick:e=>e.target===e.currentTarget&&onClose()},
    h('div',{className:'modal modal-md',style:{maxWidth:540}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}},
        h('h3',{style:{margin:0,fontSize:16,fontWeight:700}},'Customize Columns'),
        h('button',{onClick:onClose,className:'btn-ghost',style:{padding:'4px 8px'}},'✕')
      ),
      h('p',{style:{fontSize:12,color:'#9ca3af',marginBottom:12}},'Drag to reorder · Click eye to show/hide · Click label to rename · Admin can add or remove columns.'),
      h('div',{style:{maxHeight:340,overflowY:'auto',marginBottom:12}},
        items.map((col,i)=>h('div',{
          key:col.id,
          className:`col-item${dragIdx===i?' dragging':''}${overIdx===i?' drag-over':''}`,
          draggable:true,
          onDragStart:()=>onDragStart(i),
          onDragOver:e=>onDragOver(e,i),
          onDrop:()=>onDrop(i),
          onDragEnd:()=>{setDragIdx(null);setOverIdx(null);}
        },
          h('span',{className:'drag-handle'},h('i',{className:'ti ti-grip-vertical'})),
          h('button',{onClick:()=>toggle(col.id),className:'btn-ghost',style:{padding:'2px 6px',color:col.visible?'#6366f1':'#9ca3af'}},
            h('i',{className:col.visible?'ti ti-eye':'ti ti-eye-off'})),
          editId===col.id
            ?h('div',{style:{flex:1,display:'flex',gap:6}},
                h('input',{value:editLabel,onChange:e=>setEditLabel(e.target.value),onKeyDown:e=>{if(e.key==='Enter')saveLabel();if(e.key==='Escape')setEditId(null);},autoFocus:true,style:{flex:1}}),
                h('button',{onClick:saveLabel,className:'btn-primary',style:{padding:'3px 8px'}},'✓')
              )
            :h('span',{style:{flex:1,fontSize:13,color:col.visible?'#111':'#9ca3af',cursor:'pointer'},onClick:()=>isAdmin&&startEdit(col.id,col.label),title:isAdmin?'Click to rename':undefined},col.label),
          col.locked?h('span',{style:{fontSize:11,color:'#9ca3af',padding:'2px 6px'}},h('i',{className:'ti ti-lock'}))
            :isAdmin&&col.custom&&h('button',{onClick:()=>delCol(col.id),className:'btn-danger btn-ghost',style:{padding:'2px 6px'},title:'Remove column'},h('i',{className:'ti ti-trash'}))
        ))
      ),
      isAdmin&&h('div',{style:{display:'flex',gap:8,marginBottom:'1rem',borderTop:'1px solid var(--border)',paddingTop:12}},
        h('input',{value:newCol,onChange:e=>setNewCol(e.target.value),placeholder:'New column name…',onKeyDown:e=>e.key==='Enter'&&addCol()}),
        h('button',{onClick:addCol,className:'btn-primary',style:{whiteSpace:'nowrap'}},h('i',{className:'ti ti-plus'}),' Add Column')
      ),
      h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
        h('button',{onClick:onClose},'Cancel'),
        h('button',{onClick:save,className:'btn-primary'},'Save Layout')
      )
    )
  );
}

/* ─── MAIN APP ──────────────────────────────────────────────── */
function App(){
  const saved=loadState();

  const doLogin=()=>{

  };

  // ── Auto-number helpers ──────────────────────────────────
  function getFiscalYear(date){
    const d=date?new Date(date):new Date();
    const yr=d.getFullYear();const mo=d.getMonth()+1;
    const startYr=mo>=4?yr:yr-1;
    const s2=n=>String(n).slice(-2);
    return s2(startYr)+'-'+s2(startYr+1);
  }
  function buildEnqNo(seq){
    const fy=getFiscalYear();
    const pad=theme.enqPad||3;
    const seqStr=String(seq).padStart(pad,'0');
    const prefix=theme.enqPrefix||'ENQ';
    return theme.enqUseFY!==false?prefix+'/'+seqStr+'/'+fy:prefix+'/'+seqStr;
  }
  function buildQuotNo(seq){
    const fy=getFiscalYear();
    const pad=theme.quotPad||3;
    const seqStr=String(seq).padStart(pad,'0');
    const prefix=theme.quotPrefix||'RI-IND';
    return theme.quotUseFY!==false?prefix+'-'+seqStr+'/'+fy:prefix+'-'+seqStr;
  }
  function nextEnqNo(){
    const fy=getFiscalYear();
    const pad=theme.enqPad||3;
    const prefix=(theme.enqPrefix||'ENQ')+'/';
    let max=0;
    recs.forEach(r=>{
      if(r.enquiryNo&&r.enquiryNo.startsWith(prefix)){
        const parts=r.enquiryNo.split('/');
        const n=parseInt(parts[1],10);
        if(!isNaN(n))max=Math.max(max,n);
      }
    });
    return buildEnqNo(max+1);
  }
  function nextQuotNo(){
    const fy=getFiscalYear();
    const pad=theme.quotPad||3;
    const prefix=(theme.quotPrefix||'RI-IND')+'-';
    let max=0;
    recs.forEach(r=>{
      if(r.quotationNo&&r.quotationNo.startsWith(prefix)){
        const rest=r.quotationNo.slice(prefix.length);
        const n=parseInt(rest.split('/')[0],10);
        if(!isNaN(n))max=Math.max(max,n);
      }
    });
    return buildQuotNo(max+1);
  }

  // Records
  const saveRec=fd=>{
    if(editRec){setRecs(rs=>rs.map(r=>r.id===editRec.id?{...fd,id:editRec.id}:r));pop('Record updated.');}
    else{
      const ni=Math.max(0,...recs.map(r=>r.id))+1;
      const ns=Math.max(0,...recs.map(r=>r.slNo||0))+1;
      setRecs(rs=>[...rs,{...fd,id:ni,slNo:ns}]);
      pop('Record #'+ns+' added — '+fd.customer);
    }
    setShowRecFm(false);setView('records');
  };
  const delRec=id=>{if(window.confirm('Delete this record?')){setRecs(rs=>rs.filter(r=>r.id!==id));pop('Record deleted.','warn');}};

  // ── Print ──────────────────────────────────────────────────
  const doPrint=()=>{
    // Make print header visible, hide non-print elements, print, restore
    const ph=document.getElementById('rfq-print-header');
    if(ph)ph.style.display='flex';
    // Remove border/radius from print area for clean output
    const pa=document.getElementById('rfq-print-area');
    let origStyle='';
    if(pa){origStyle=pa.style.cssText;pa.style.border='none';pa.style.borderRadius='0';pa.style.overflow='visible';}
    setTimeout(()=>{
      window.print();
      if(ph)ph.style.display='';
      if(pa&&origStyle!==undefined)pa.style.cssText=origStyle;
    },120);
  };

  // ── Email ───────────────────────────────────────────────────
  const doEmail=(rows,cols)=>{
    const subject=encodeURIComponent((theme.cname||'RFQ Tracking')+' — Records Export '+new Date().toLocaleDateString('en-IN'));
    // Build plain-text table for email body
    const hdr=cols.map(c=>c.label).join(' | ');
    const sep=cols.map(c=>'-'.repeat(c.label.length)).join('-+-');
    const body_rows=rows.slice(0,30).map(r=>cols.map(c=>{
      const v=r[c.id];
      if(!v||v===null)return'—';
      if(c.type==='date'&&v){try{return new Date(v).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch{return v;}}
      return String(v);
    }).join(' | ')).join('\n');
    const note=rows.length>30?`\n(Showing first 30 of ${rows.length} records. Export full Excel for complete data.)`:'';
    const fullBody=`${theme.cname||'RFQ Tracking System'}\n${theme.tag||''}\nGenerated: ${new Date().toLocaleString('en-IN')}\n\n${hdr}\n${sep}\n${body_rows}${note}\n\nThis email was generated from the RFQ Tracking System.`;
    const mailto=`mailto:?subject=${subject}&body=${encodeURIComponent(fullBody)}`;
    window.location.href=mailto;
  };

  const handleExcelImport=(importedRows,dupMode)=>{
    setRecs(prev=>{
      if(dupMode==='replace'){
        // replace records matching by enquiryNo, keep rest
        const impNos=new Set(importedRows.map(r=>r.enquiryNo).filter(Boolean));
        const kept=prev.filter(r=>!r.enquiryNo||!impNos.has(r.enquiryNo));
        const merged=[...kept,...importedRows].map((r,i)=>({...r,id:i+1,slNo:i+1}));
        return merged;
      }
      if(dupMode==='skip'){
        const existNos=new Set(prev.map(r=>r.enquiryNo).filter(Boolean));
        const newOnes=importedRows.filter(r=>!r.enquiryNo||!existNos.has(r.enquiryNo));
        const merged=[...prev,...newOnes].map((r,i)=>({...r,id:i+1,slNo:i+1}));
        return merged;
      }
      // append all
      const merged=[...prev,...importedRows].map((r,i)=>({...r,id:i+1,slNo:i+1}));
      return merged;
    });
    pop('Excel import complete — '+importedRows.length+' records loaded.');
    setView('records');
  };;

  // Customers (auto-sync)
  const saveCust=()=>{
    const v=cfd.trim();if(!v)return;
    if(editCIdx!==null){
      const old=custs[editCIdx];
      setRecs(rs=>rs.map(r=>r.customer===old?{...r,customer:v}:r));
      setCusts(cs=>cs.map((x,i)=>i===editCIdx?v:x));
      pop('Customer updated & synced to all records.');
    }else{
      if(custs.includes(v)){pop('Already exists.','warn');return;}
      setCusts(cs=>[...cs,v]);pop('Customer added.');
    }
    setShowCustFm(false);
  };
  const delCust=i=>{
    const n=custs[i];
    if(recs.some(r=>r.customer===n)){window.alert('Cannot delete — customer has records.');return;}
    if(window.confirm('Delete "'+n+'"?')){setCusts(cs=>cs.filter((_,j)=>j!==i));pop('Deleted.','warn');}
  };

  // Users
  const saveUsr=()=>{
    if(!ufd.name||!ufd.username||!ufd.role)return;
    if(editUsr){setUsers(us=>us.map(u=>u.id===editUsr.id?{...u,...ufd}:u));if(user.id===editUsr.id)setUser(u=>({...u,...ufd}));pop('User updated.');}
    else{if(!ufd.password){pop('Password required.','warn');return;}const ni=Math.max(0,...users.map(u=>u.id))+1;setUsers(us=>[...us,{id:ni,...ufd,active:true}]);pop('User created.');}
    setShowUsrFm(false);
  };
  const savePw=()=>{
    setPwErr('');
    const isOther=isAdmin&&pwTarget&&pwTarget.id!==user.id;
    if(!isOther&&pwfd.old!==user.password){setPwErr('Current password incorrect.');return;}
    if(!pwfd.n1){setPwErr('New password required.');return;}
    if(pwfd.n1!==pwfd.n2){setPwErr('Passwords do not match.');return;}
    setUsers(us=>us.map(u=>u.id===(isOther?pwTarget.id:user.id)?{...u,password:pwfd.n1}:u));
    if(!isOther)setUser(u=>({...u,password:pwfd.n1}));
    pop('Password changed.');setShowPwFm(false);
  };

  const handleLogo=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setTheme(t=>({...t,logo:ev.target.result}));r.readAsDataURL(f);pop('Logo updated.');};

  const filtered=useMemo(()=>recs.filter(r=>{
    const ms=!srch||[r.customer,r.enquiryNo,r.quotationNo,r.poNo,r.remarks].some(v=>v&&String(v).toLowerCase().includes(srch.toLowerCase()));
    return ms&&(fSt==='All'||r.status===fSt)&&(fCu==='All'||r.customer===fCu);
  }),[recs,srch,fSt,fCu]);

  const stats=useMemo(()=>({
    total:recs.length,
    ap:recs.filter(r=>r.status==='KO Approved').length,
    ca:recs.filter(r=>r.status==='Cancelled').length,
    co:recs.filter(r=>r.status==='Complete'||r.status==='Dispatched').length,
    pe:recs.filter(r=>!r.status||r.status==='Pending'||r.status==='Waiting for Customer Feedback').length,
  }),[recs]);

  function renderCell(r,col){
    if(col.id==='slNo')return h('td',{key:col.id,style:{padding:'7px 12px',color:'#9ca3af',fontSize:12,fontWeight:500,width:col.width}},r.slNo);

    if(col.type==='date')return h('td',{key:col.id,style:{padding:'7px 12px',color:'var(--sec)',fontSize:12,whiteSpace:'nowrap',width:col.width}},fmt(r[col.id]));
    if(col.align==='right')return h('td',{key:col.id,style:{padding:'7px 12px',textAlign:'right',fontSize:13,width:col.width}},r[col.id]||'—');
    if(col.id==='customer')return h('td',{key:col.id,style:{padding:'7px 12px',fontWeight:600,fontSize:13,whiteSpace:'nowrap',width:col.width}},r[col.id]);
    if(col.id==='quotationNo')return h('td',{key:col.id,style:{padding:'7px 12px',fontSize:12,color:'var(--acc)',whiteSpace:'nowrap',width:col.width}},r[col.id]||'—');
    if(col.id==='remarks')return h('td',{key:col.id,style:{padding:'7px 12px',color:'var(--sec)',fontSize:12,maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',width:col.width}},r[col.id]||'');
    return h('td',{key:col.id,style:{padding:'7px 12px',fontSize:13,whiteSpace:'nowrap',width:col.width}},r[col.id]||'—');

  /* ── LOGIN PAGE ── */
  if(!user) return h('div',{style:{minHeight:'100vh',display:'flex',background:'linear-gradient(135deg,'+theme.hBg+' 0%,#4338ca 100%)'}},
    h('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem'}},
      h('div',{style:{background:'#fff',borderRadius:16,padding:'2.5rem',width:'100%',maxWidth:400,boxShadow:'0 24px 64px rgba(0,0,0,.28)'}},
        h('div',{style:{textAlign:'center',marginBottom:'2rem'}},
          theme.logo
            ?h('img',{src:theme.logo,style:{height:(theme.loginLogoSize||60),objectFit:'contain',marginBottom:14,borderRadius:8,display:'block',margin:'0 auto 14px',maxWidth:240,transition:'height .2s'}})
            :h('div',{style:{width:60,height:60,borderRadius:14,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}},
                h('i',{className:'ti ti-clipboard-list',style:{fontSize:28,color:'#fff'}})),
          h('h2',{style:{fontSize:22,fontWeight:800,color:'#111',margin:'0 0 4px'}},theme.cname),

            )

          lErr&&h('div',{style:{background:'#fee2e2',color:'#991b1b',borderRadius:8,padding:'9px 12px',fontSize:13,display:'flex',gap:6,alignItems:'center'}},h('i',{className:'ti ti-alert-circle'}),lErr),
          h('button',{onClick:doLogin,className:'btn-primary',style:{padding:'11px',borderRadius:10,fontSize:15,fontWeight:700,border:'none'}},'Sign In'),

  },h('i',{className:'ti '+icon}),label);

  /* ── MAIN LAYOUT ── */
  return h('div',{style:{minHeight:'100vh',background:'var(--bg)'}},

      h('div',{style:{display:'flex',alignItems:'center',gap:12}},

        ),

            h('div',{key:l,className:'stat-card'},

            /* Export dropdown */

        h('h3',{style:{margin:'0 0 1rem',fontSize:16,fontWeight:700}},editCIdx!==null?'Edit Customer':'Add Customer'),
        editCIdx!==null&&h('div',{style:{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#92400e',marginBottom:12,display:'flex',gap:6}},
          h('i',{className:'ti ti-refresh'}),' All linked records update automatically.'),
        h('div',{className:'igrp',style:{marginBottom:14}},
          h('label',null,'Customer Name'),
          h('input',{value:cfd,onChange:e=>setCfd(e.target.value),placeholder:'Full customer name',onKeyDown:e=>e.key==='Enter'&&saveCust()})
        ),
        h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
          h('button',{onClick:()=>setShowCustFm(false)},'Cancel'),
          h('button',{onClick:saveCust,className:'btn-primary'},editCIdx!==null?'Update & Sync All':'Add Customer')
        )
      )
    ),

    showUsrFm&&h('div',{className:'modal-bg',onClick:e=>e.target===e.currentTarget&&setShowUsrFm(false)},
      h('div',{className:'modal modal-sm'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}},
          h('h3',{style:{margin:0,fontSize:16,fontWeight:700}},editUsr?'Edit User':'Add New User'),
          h('button',{onClick:()=>setShowUsrFm(false),className:'btn-ghost',style:{padding:'4px 8px'}},'✕')
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          h('div',{className:'igrp'},h('label',null,'Full Name *'),h('input',{value:ufd.name||'',onChange:e=>setUfd(f=>({...f,name:e.target.value})),placeholder:'Full name'})),
          h('div',{className:'igrp'},h('label',null,'Username *'),h('input',{value:ufd.username||'',onChange:e=>setUfd(f=>({...f,username:e.target.value})),placeholder:'Login username',autoComplete:'off'})),
          !editUsr&&h('div',{className:'igrp'},h('label',null,'Password *'),h('input',{type:'password',value:ufd.password||'',onChange:e=>setUfd(f=>({...f,password:e.target.value})),placeholder:'Initial password',autoComplete:'new-password'})),
          h('div',{className:'igrp'},
            h('label',null,'Role *'),
            h('select',{value:ufd.role||'Viewer',onChange:e=>setUfd(f=>({...f,role:e.target.value}))},ROLES.map(r=>h('option',{key:r,value:r},r)))
          ),
          h('div',{style:{background:'var(--alt)',borderRadius:8,padding:'10px 12px',fontSize:12,color:'var(--sec)',lineHeight:1.6}},
            h('strong',null,'Admin'),' — full control.  ',h('strong',null,'Manager/Sales'),' — view only.  ',h('strong',null,'Viewer'),' — read-only.')
        ),
        h('div',{style:{display:'flex',gap:8,marginTop:'1.25rem',justifyContent:'flex-end'}},
          h('button',{onClick:()=>setShowUsrFm(false)},'Cancel'),
          h('button',{onClick:saveUsr,className:'btn-primary'},editUsr?'Save Changes':'Create User')
        )
      )
    ),

    showPwFm&&h('div',{className:'modal-bg',onClick:e=>e.target===e.currentTarget&&setShowPwFm(false)},
      h('div',{className:'modal modal-sm'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.25rem'}},
          h('h3',{style:{margin:0,fontSize:16,fontWeight:700}},isAdmin&&pwTarget&&pwTarget.id!==user.id?'Reset — '+pwTarget.name:'Change My Password'),
          h('button',{onClick:()=>setShowPwFm(false),className:'btn-ghost',style:{padding:'4px 8px'}},'✕')
        ),
        isAdmin&&pwTarget&&pwTarget.id!==user.id&&h('div',{style:{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#166534',marginBottom:12}},h('i',{className:'ti ti-shield-check'}),' Admin override for @'+pwTarget.username),
        h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          (!isAdmin||!pwTarget||pwTarget.id===user.id)&&h(PwIn,{label:'Current Password',fk:'old',fd:pwfd,set:setPwfd,show:!!pwSh.old,onToggle:()=>setPwSh(s=>({...s,old:!s.old}))}),
          h(PwIn,{label:'New Password',fk:'n1',fd:pwfd,set:setPwfd,show:!!pwSh.n1,onToggle:()=>setPwSh(s=>({...s,n1:!s.n1}))}),
          h(PwIn,{label:'Confirm New Password',fk:'n2',fd:pwfd,set:setPwfd,show:!!pwSh.n2,onToggle:()=>setPwSh(s=>({...s,n2:!s.n2}))}),
          pwErr&&h('p',{style:{margin:0,fontSize:13,color:'#dc2626',display:'flex',gap:5,alignItems:'center'}},h('i',{className:'ti ti-alert-circle'}),pwErr)
        ),
        h('div',{style:{display:'flex',gap:8,marginTop:'1.25rem',justifyContent:'flex-end'}},
          h('button',{onClick:()=>setShowPwFm(false)},'Cancel'),
          h('button',{onClick:savePw,className:'btn-primary'},'Update Password')
        )
      )
    ),

    showExcel&&h(ExcelUpload,{onImport:handleExcelImport,onClose:()=>setShowExcel(false),custs,setCusts}),
    toast&&h('div',{className:'toast',style:{background:toast.warn?'#92400e':'#111'}},
      h('i',{className:toast.warn?'ti ti-alert-triangle':'ti ti-check'}),toast.msg)
  );
}

ReactDOM.render(h(App),document.getElementById('app'));
</script>
</body>
</html>
